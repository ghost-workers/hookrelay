# fly.toml app configuration file generated for hookrelay on 2026-03-05T20:33:37-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hookrelay'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOOKRELAY_DB_PATH = '/data/hookrelay.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'hookrelay_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 250

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
